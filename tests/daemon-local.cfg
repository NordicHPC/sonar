# Config file for testing from a workstation against a local kafka broker.
#
# The broker needs to know these topics to which sonar will post data:
#
#   akebakken.no.sample
#   akebakken.no.sysinfo
#
# The broker needs to know these topics on which sonar will listen for commands:
#
#   akebakken.no.node
#
# -----
#
# Test notes with standard Kafka server, see https://kafka.apache.org/quickstart.
#
# In the first shell:
#
#   bin/zookeeper-server-start.sh config/zookeeper.properties
#
# In a second shell:
#
#   bin/kafka-server-start.sh config/server.properties
#
# Topics need to be added with kafka-topics a la this (in a third shell):
#
#   bin/kafka-topics.sh --create --topic akebakken.no.slurm --bootstrap-server localhost:9092
#
# The topics:
#
#   akebakken.no.sample
#   akebakken.no.sysinfo
#   akebakken.no.node
#
# Then run sonar in daemon mode with this file:
#
#   target/debug/sonar daemon tests/daemon-local.cfg
#
# Sonar will run continuously and start pumping data to kafka.
#
# In another shell, go to ../util/ingest-kafka and build `ingest-kafka` if you haven't already.
# This will subscribe to kafka and echo messages it receives.
#
# Alternatively, run this in a shell to listen for sysinfo messages:
#
#   bin/kafka-console-consumer.sh --topic 'akebakken.no.sysinfo' --bootstrap-server localhost:9092
#
# Or run this in a shell to listen for sample messages:
#
#   bin/kafka-console-consumer.sh --topic 'akebakken.no.sample' --bootstrap-server localhost:9092
#
# To send control messages to sonar:
#
#   bin/kafka-console-producer.sh --bootstrap-server localhost:9092 --topic akebakken.no.node --property parse.key=true
#
# and then use TAB to separate key and value on each line.  A good test is `dump true` and `dump
# false`, but `exit` should work (without a value).

[global]
cluster = akebakken.no
role = node

[debug]
verbose = true

[kafka]
remote-host = localhost:9092
poll-interval = 1m

[sample]
cadence = 1m
batchless = true

[sysinfo]
cadence = 30s
on-startup = false
